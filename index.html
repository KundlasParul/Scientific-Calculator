<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css"></link>
    <script type="text/javascript" src="js calc/index.js"></script>
    <title>Calculator</title>
</head>
<body>
    <div class="container">
       <h1>Calculator By WebD</h1>

       <div class="Calculator">
           <input type="text" name="screen" id="screen">
       <table>
        <tr>
            <td><button onclick="clk('(')">(</button></td>
            <td><button onclick="clk(')')">)</button></td>
            <td><button onclick="clk()">C</button></td>
            <td><button onclick="clk('%')">%</button></td>
        </tr>
        <tr>
            <td><button onclick="clk(7)">7</button></td>
            <td><button onclick="clk(8)">8</button></td>
            <td><button onclick="clk(9)">9</button></td>
            <td><button onclick="clk('*')">*</button></td>
        </tr>
        <tr>
            <td><button onclick="clk(4)">4</button></td>
            <td><button onclick="clk(5)">5</button></td>
            <td><button onclick="clk(6)">6</button></td>
            <td><button onclick="clk('-')">-</button></td>
        </tr>
        <tr>
            <td><button onclick="clk(1)">1</button></td>
            <td><button onclick="clk(2)">2</button></td>
            <td><button onclick="clk(3)">3</button></td>
            <td><button onclick="clk('+')">+</button></td>
        </tr>
        <tr>
            <td><button onclick="clk(0)">0</button></td>
            <td><button onclick="clk('.')">.</button></td>
            <td><button onclick="clk('/')">/</button></td>
            <td><button onclick="clk('=')">=</button></td>
        </tr>
        
        
       </table>
    </div>
    </div>
</body>

</html>
